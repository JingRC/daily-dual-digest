name: Aethon

on:
  schedule:
    # Target: Beijing 8:00 AM (UTC 0:00). GitHub scheduler delays
    # UTC midnight runs by 2-4h due to peak load, so we fire at
    # UTC 22:00-22:30 (Beijing 6:00-6:30 AM) to land around 8:00.
    - cron: '0 22 * * *'
    - cron: '5 22 * * *'
    - cron: '10 22 * * *'
    - cron: '15 22 * * *'
    - cron: '20 22 * * *'
    - cron: '25 22 * * *'
    - cron: '30 22 * * *'
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - 'config.yml'

permissions:
  contents: write
  pages: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Get today's date (Beijing time)
        id: date
        run: echo "today=$(TZ='Asia/Shanghai' date +%Y-%m-%d)" >> $GITHUB_OUTPUT

      # Cache-based sentinel: restore at start, auto-save at end of job
      - name: Email sentinel cache
        id: sentinel
        uses: actions/cache@v4
        with:
          path: .email-sentinel
          key: daily-email-${{ steps.date.outputs.today }}

      # Schedule: skip if email already sent today
      # Manual dispatch: always run (bypass cache)
      - name: Skip — email already sent today
        if: steps.sentinel.outputs.cache-hit == 'true' && github.event_name == 'schedule'
        run: |
          echo "📬 Email already sent on ${{ steps.date.outputs.today }}, all done!"

      - name: Install CJK fonts (for XHS image cards)
        if: steps.sentinel.outputs.cache-hit != 'true' || github.event_name != 'schedule'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq fonts-noto-cjk 2>&1 | tail -1
          fc-list :lang=zh | head -3

      - uses: actions/setup-python@v5
        if: steps.sentinel.outputs.cache-hit != 'true' || github.event_name != 'schedule'
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        if: steps.sentinel.outputs.cache-hit != 'true' || github.event_name != 'schedule'
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate daily digest
        if: steps.sentinel.outputs.cache-hit != 'true' || github.event_name != 'schedule'
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_PAGE_ID: ${{ secrets.NOTION_PAGE_ID }}
          APIHZ_KEY: ${{ secrets.APIHZ_KEY }}
          APIHZ_ID: ${{ secrets.APIHZ_ID }}
          PYTHONUNBUFFERED: "1"
        run: |
          echo "=== Python $(python --version) ==="
          echo "=== Chrome $(google-chrome --version 2>/dev/null || chromium-browser --version 2>/dev/null || echo 'not found') ==="
          set +e
          python main.py
          EXIT=$?
          echo "=== python main.py exit code: $EXIT ==="
          if [ $EXIT -ne 0 ]; then
            echo "=== Checking for core dumps ==="
            ls -la core* 2>/dev/null || true
            dmesg 2>/dev/null | tail -20 || true
          fi
          exit $EXIT

      - name: Mark email as sent
        if: success() && (steps.sentinel.outputs.cache-hit != 'true' || github.event_name != 'schedule')
        run: |
          mkdir -p .email-sentinel
          echo "${{ steps.date.outputs.today }}" > .email-sentinel/date
          echo "✅ Marked as sent — later cron runs will skip"

      - name: Commit XHS cards to repo
        if: success() && (steps.sentinel.outputs.cache-hit != 'true' || github.event_name != 'schedule')
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git stash --include-untracked
          git pull --rebase origin master
          git stash pop || true
          git add docs/xhs/
          if git diff --cached --quiet; then
            echo "No card changes to commit"
          else
            git commit -m "auto: XHS cards — ${{ steps.date.outputs.today }}"
            git push origin master
            echo "✅ Cards pushed to repo"
          fi

      - name: Deploy to GitHub Pages
        if: steps.sentinel.outputs.cache-hit != 'true' || github.event_name != 'schedule'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          publish_branch: gh-pages
          keep_files: true
