# ============================================
# 每日双拼日报配置 (AI快讯 + 中国古代故事)
# ============================================

# --- LLM 配置 ---
llm:
  provider: "deepseek"          # deepseek / openai / anthropic / gemini
  api_key: "${DEEPSEEK_API_KEY}"  # 从环境变量读取
  model: "deepseek-chat"         # deepseek-chat / gpt-4o / claude-sonnet-4-20250514
  base_url: "https://api.deepseek.com"
  temperature: 0.7
  max_tokens: 8192

# --- AI 快讯配置 ---
ai_news:
  enabled: true
  count: 10                      # 每日推送条数
  sources:
    rss:
      - "https://huggingface.co/blog/feed.xml"
      - "https://techcrunch.com/feed/"
      - "https://www.theverge.com/rss/index.xml"
      - "https://feeds.36kr.com/feed"
      - "https://www.ifanr.com/feed"
      - "https://rss.arxiv.org/rss/cs.AI"
    github_trending: true
    languages: ["zh", "en"]      # 中英双语

# --- 中国古代故事配置 ---
ancient_stories:
  enabled: true
  count: 20                      # 每日推送条数（10→20）
  categories:                    # 轮换主题（每天基于日期hash选一个为主）
    - "成语典故"
    - "历史故事"
    - "诸子百家寓言"
    - "唐诗宋词背后的故事"
    - "古代名人逸事"
    - "兵法谋略故事"
    - "古代科技发明故事"
    - "传统节日传说"
    - "古代天文地理"              # 星宿/节气/历法/地理发现/山海经
    - "历史趣考"                  # 有趣的历史考据/冷知识/颠覆常识

# --- 输出配置 ---
output:
  site_dir: "docs"               # GitHub Pages 输出目录
  generate_html: true
  generate_markdown: true
  generate_podcast: false        # 可选语音播报

# --- Email 推送配置 ---
email:
  enabled: true
  smtp_server: "smtp.gmail.com"
  smtp_port: 587
  sender_email: "${GMAIL_USER}"
  sender_password: "${GMAIL_APP_PASSWORD}"  # Gmail应用专用密码
  recipient_email: "${RECIPIENT_EMAIL}"
  subject_template: "📬 每日双拼日报 | AI快讯×古代故事 | {date}"

# --- Notion 同步配置 ---
notion:
  enabled: true                    # 是否启用
  token: "${NOTION_TOKEN}"         # Notion Internal Integration Secret
  page_id: "${NOTION_PAGE_ID}"     # 父页面 ID（日报作为子页面创建在下面）

# --- 调度配置 ---
schedule:
  timezone: "Asia/Shanghai"
  hour: 8                        # 北京时间早上8点发送
